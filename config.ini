[lxmf]
# Path for RNS and LXMF storage (identity, routing tables)
storage_path = ~/.lxmf_aprs_bridge

[aprs]
# APRS-IS server — point at local aprsc instance
host = localhost
port = 14580

# Your gateway callsign and passcode (used for APRS-IS login only)
callsign = VK2RNS-5
passcode = YOUR_PASSCODE_HERE

# APRS symbol for Reticulum peers
# Primary table (/): [ = person, > = car, - = house, Y = yacht, R = recreational vehicle
# Overlay table (\): many additional symbols
symbol_table = /
symbol_code = [

# Prefix for the APRS comment field
# Result: "RNS [Steve VK2XYZ]" or "RNS [A1B2C3]" if no display name known
comment_prefix = RNS

[bridge]
# SQLite database for peer tracking
db_path = ~/.lxmf_aprs_bridge/peers.db

# Seconds between APRS-IS keepalive comments
keepalive_interval = 600

# Suppress forwarding a position if last forward was within this many seconds...
dedupe_window = 60

# ...AND the peer has moved less than this many metres
dedupe_distance = 10.0

# Listen for LXMF announces to capture peer display names
announce_listen = true

# Include display name (from announce) in APRS comment field
# If false, falls back to last 6 hex digits of LXMF hash
lxmf_display_in_comment = true
